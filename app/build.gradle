plugins {
    id 'com.android.application'
    // id 'org.jetbrains.kotlin.android'  // موقتاً کامنت
    // id 'kotlin-kapt'                   // موقتاً کامنت
    // id 'com.google.dagger.hilt.android' // موقتاً کامنت
}

android {
    namespace 'com.miladofficial.vamtracker'
    compileSdk 34

    defaultConfig {
        applicationId "com.miladofficial.vamtracker"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        compose true
    }

    composeOptions {
        kotlinCompilerExtensionVersion '1.5.3'
    }
}

dependencies {
    // همه dependencies موقتاً حذف شدن برای تست
}